name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # Hardware-facing dependencies (pyaudio, pyrtlsdr) are intentionally
      # NOT installed: the test suite injects fakes for them in
      # tests/conftest.py so no sound device or SDR driver is needed.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Byte-compile all sources
        run: python -m compileall fm_radio fm_receiver.py

      - name: Run tests
        run: pytest -q
